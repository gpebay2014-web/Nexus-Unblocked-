<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Games | Unblocked Gaming Portal</title>
  </head>
  <body style="background-color: #000000; color: #ffffff; margin: 0;">
    <div id="fallback-loader" style="position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 1000; background-color: #000000; transition: opacity 0.5s ease-in-out; pointer-events: none;">
      <div style="font-size: 24px; font-weight: bold; font-style: italic; letter-spacing: -0.05em; font-family: 'Playfair Display', serif; color: #ffffff;">Nexus.<span style="color: #00F0FF;">json</span></div>
      <div style="font-size: 10px; opacity: 0.5; letter-spacing: 0.5em; font-family: 'Inter', sans-serif; color: #ffffff;">INITIALIZING_CORE...</div>
      <div style="width: 100px; hieght: 1px; background: rgba(255,255,255,0.1); position: relative; overflow: hidden;">
        <div id="loader-bar" style="position: absolute; inset: 0; background: #00F0FF; width: 0%; transition: width 0.3s ease;"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Enhanced mount detection
      const loader = document.getElementById('fallback-loader');
      const loaderBar = document.getElementById('loader-bar');
      let progress = 0;
      
      const updateProgress = () => {
        if (progress < 90) {
          progress += Math.random() * 5;
          if (loaderBar) loaderBar.style.width = progress + '%';
        }
      };
      
      const interval = setInterval(updateProgress, 200);

      const checkMount = setInterval(() => {
        const root = document.getElementById('root');
        // Check if root has any children (React has mounted)
        if (root && root.hasChildNodes()) {
          if (loaderBar) loaderBar.style.width = '100%';
          setTimeout(() => {
            if (loader) {
              loader.style.opacity = '0';
              setTimeout(() => loader.remove(), 500);
            }
          }, 300);
          clearInterval(checkMount);
          clearInterval(interval);
        }
      }, 100);

      // Safety timeout (8 seconds)
      setTimeout(() => {
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 500);
        }
        clearInterval(checkMount);
        clearInterval(interval);
      }, 8000);
    </script>
  </body>
</html>
