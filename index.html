<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Games | Unblocked Gaming Portal</title>
  </head>
    <body style="background-color: #000000; color: #ffffff; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif;">
    <div id="root" style="width: 100%; min-height: 100vh; background-color: #000000;">
      <div id="fallback-loader" style="position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 100;">
        <div style="font-size: 24px; font-weight: bold; font-style: italic; letter-spacing: -0.05em;">Nexus.<span style="color: #00F0FF;">json</span></div>
        <div style="font-size: 10px; opacity: 0.5; letter-spacing: 0.5em;">INITIALIZING_CORE...</div>
      </div>
    </div>
    <script type="module" src="src/main.jsx"></script>
    <script>
      // Remove fallback loader once React mounts
      const checkMount = setInterval(() => {
        if (document.querySelector('main')) {
          const loader = document.getElementById('fallback-loader');
          if (loader) loader.style.display = 'none';
          clearInterval(checkMount);
        }
      }, 100);
    </script>
  </body>
</html>
